name: Release Windows App

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows executable
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Build app with PyInstaller
        shell: pwsh
        run: .\scripts\build_windows.ps1

      - name: Package release zip
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $zip = "open-stereoscope-$version-windows.zip"
          Compress-Archive -Path "dist\open-stereoscope" -DestinationPath $zip -Force
          Get-FileHash $zip -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash)  $zip" } |
            Set-Content "open-stereoscope-$version-windows.sha256.txt"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            open-stereoscope-${{ github.ref_name }}-windows.zip
            open-stereoscope-${{ github.ref_name }}-windows.sha256.txt
